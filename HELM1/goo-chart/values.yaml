replicaCount: 1

image:
  repository: bikkybabu/new-app
  pullPolicy: IfNotPresent
  tag: v1

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}

podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: LoadBalancer
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: vik.com
      paths:
        - path: /home
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false

resources: {}

livenessProbe:
  httpGet:
    path: /home
    port: http

readinessProbe:
  httpGet:
    path: /home
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}
